name: huria-apk

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Telegram
      run: git clone https://github.com/DrKLO/Telegram.git

    - name: Customize Huria
      run: |
        cd Telegram
        find . -name "strings.xml" | xargs sed -i 's/Telegram/Huria/g'
        find . -name "*.java" | xargs sed -i 's/org.telegram.messenger/com.huria.messenger/g'
        find . -name "*.gradle" | xargs sed -i 's/org.telegram.messenger/com.huria.messenger/g'
        find . -name "colors.xml" | xargs sed -i 's/#2ca5e0/#1a237e/g'
        find . -name "colors.xml" | xargs sed -i 's/#179cde/#1a237e/g'

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK
      run: |
        cd Telegram
        chmod +x gradlew
        ./gradlew assembleDebug -x processDebugGoogleServices

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: huria-app
        path: Telegram/TMessagesProj_App/build/outputs/apk/
